# ClusterTrainingRuntime for TRL-based LLM fine-tuning.
#
# This runtime provides the container image and distributed training
# configuration for the TRL backend.  It is discovered by the SDK via
# the trainer.kubeflow.org/framework=torch label.
#
# Usage with the SDK:
#   client.train(
#       runtime="trl-distributed",
#       trainer=LLMTrainer(
#           config=LLMConfig(
#               model="meta-llama/Llama-3.2-1B-Instruct",
#               dataset="tatsu-lab/alpaca",
#               method=FineTuningMethod.DPO,
#               backend_name="trl",
#           ),
#           resources_per_node={"gpu": 2},
#       ),
#   )
apiVersion: trainer.kubeflow.org/v1alpha1
kind: ClusterTrainingRuntime
metadata:
  name: trl-distributed
  labels:
    trainer.kubeflow.org/framework: torch
    trainer.kubeflow.org/llm-backend: trl
spec:
  numNodes: 1
  startupPolicy:
    startupPolicyOrder: InOrder
  template:
    spec:
      replicatedJobs:
        - name: node
          template:
            spec:
              template:
                spec:
                  containers:
                    - name: trainer
                      image: ghcr.io/kubeflow/trainer/trl-trainer:latest
                      env:
                        - name: KUBEFLOW_MODEL_PATH
                          value: /mnt/model
                        - name: KUBEFLOW_DATASET_PATH
                          value: /mnt/dataset
                      resources:
                        limits:
                          nvidia.com/gpu: "2"
                      volumeMounts:
                        - name: model-volume
                          mountPath: /mnt/model
                        - name: dataset-volume
                          mountPath: /mnt/dataset
                        - name: output-volume
                          mountPath: /mnt/output
                  volumes:
                    - name: model-volume
                      persistentVolumeClaim:
                        claimName: "$(RUNTIME_NAME)"
                    - name: dataset-volume
                      emptyDir: {}
                    - name: output-volume
                      emptyDir: {}
